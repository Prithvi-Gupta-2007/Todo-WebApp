kind = "web"
previewPath = "/"
title = "Ocean Todo App"
version = "1.0.0"
id = "artifacts/ocean-todo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21037

[services.development]
run = "pnpm --filter @workspace/ocean-todo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ocean-todo", "run", "build" ]
publicDir = "artifacts/ocean-todo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21037"
BASE_PATH = "/"
